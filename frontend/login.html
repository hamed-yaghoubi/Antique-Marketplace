<!DOCTYPE html>
<html lang="fa" dir="rtl">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

</head>

    <!-- ====== هدر ====== -->
    <nav class="navbar navbar-expand-lg navbar-antique">

            <a class="navbar-brand fw-bold" href="index.html">🏺 آنتیک مارکت</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">خانه</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">سبد خرید</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="nav-guest-links">
                        <a class="nav-link d-inline active" href="login.html">ورود</a>
                        <a class="nav-link d-inline" href="register.html">ثبت‌نام</a>
                    </li>
                    <li class="nav-item dropdown d-none" id="nav-user-links">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            👤 <span id="nav-username"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="my-products.html">محصولات من</a></li>
                            <li><a class="dropdown-item" href="add-product.html">افزودن محصول</a></li>
                            <li><a class="dropdown-item" href="orders.html">سفارش‌های من</a></li>
                            <li><a class="dropdown-item" href="profile.html">پروفایل من</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="nav-logout">خروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ====== فرم ورود ====== -->
    <div class="container">
        <div class="card auth-card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">ورود به حساب کاربری</h3>

                <div id="alert-container"></div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">نام کاربری</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">رمز عبور</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-antique w-100" id="login-btn">ورود</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    حساب کاربری ندارید؟ <a href="register.html">ثبت‌نام کنید</a>
                </p>
            </div>
        </div>
    </div>

    <!-- ====== فوتر ====== -->
    <footer class="footer-antique">
        <p class="mb-0">© ۱۴۰۵ آنتیک مارکت - تمامی حقوق محفوظ است</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
