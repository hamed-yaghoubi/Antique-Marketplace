<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل من | آنتیک مارکت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ====== هدر ====== -->
    <nav class="navbar navbar-expand-lg navbar-antique">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏺 آنتیک مارکت</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">خانه</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">سبد خرید</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="nav-guest-links">
                        <a class="nav-link d-inline" href="login.html">ورود</a>
                        <a class="nav-link d-inline" href="register.html">ثبت‌نام</a>
                    </li>
                    <li class="nav-item dropdown d-none" id="nav-user-links">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            👤 <span id="nav-username"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="my-products.html">محصولات من</a></li>
                            <li><a class="dropdown-item" href="add-product.html">افزودن محصول</a></li>
                            <li><a class="dropdown-item" href="orders.html">سفارش‌های من</a></li>
                            <li><a class="dropdown-item active" href="profile.html">پروفایل من</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="nav-logout">خروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row g-4 justify-content-center">

            <!-- اطلاعات کاربری -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="mb-3">اطلاعات حساب کاربری</h4>
                        <div id="profile-info">
                            <div class="text-center py-4">
                                <div class="spinner-border text-secondary" role="status">
                                    <span class="visually-hidden">در حال بارگذاری...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- تغییر رمز عبور -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="mb-3">تغییر رمز عبور</h4>

                        <div id="alert-container"></div>

                        <form id="change-password-form">
                            <div class="mb-3">
                                <label for="current_password" class="form-label">رمز عبور فعلی</label>
                                <input type="password" class="form-control" id="current_password" required>
                            </div>
                            <div class="mb-3">
                                <label for="new_password" class="form-label">رمز عبور جدید</label>
                                <input type="password" class="form-control" id="new_password" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">تکرار رمز عبور جدید</label>
                                <input type="password" class="form-control" id="confirm_password" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-antique w-100" id="change-pw-btn">تغییر رمز عبور</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ====== فوتر ====== -->
    <footer class="footer-antique">
        <p class="mb-0">© ۱۴۰۵ آنتیک مارکت - تمامی حقوق محفوظ است</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
