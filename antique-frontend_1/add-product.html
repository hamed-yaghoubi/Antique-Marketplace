<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">افزودن محصول | آنتیک مارکت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ====== هدر ====== -->
    <nav class="navbar navbar-expand-lg navbar-antique">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏺 آنتیک مارکت</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">خانه</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">سبد خرید</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="nav-guest-links">
                        <a class="nav-link d-inline" href="login.html">ورود</a>
                        <a class="nav-link d-inline" href="register.html">ثبت‌نام</a>
                    </li>
                    <li class="nav-item dropdown d-none" id="nav-user-links">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            👤 <span id="nav-username"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="my-products.html">محصولات من</a></li>
                            <li><a class="dropdown-item active" href="add-product.html">افزودن محصول</a></li>
                            <li><a class="dropdown-item" href="orders.html">سفارش‌های من</a></li>
                            <li><a class="dropdown-item" href="profile.html">پروفایل من</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="nav-logout">خروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4" id="form-title">افزودن محصول جدید</h3>

                <div id="alert-container"></div>

                <form id="product-form">
                    <div class="mb-3">
                        <label for="title" class="form-label">عنوان محصول</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">توضیحات</label>
                        <textarea class="form-control" id="description" rows="4" required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">قیمت (تومان)</label>
                            <input type="number" class="form-control" id="price" required min="0" step="0.01">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">تعداد موجودی</label>
                            <input type="number" class="form-control" id="quantity" required min="0" step="1">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">دسته‌بندی</label>
                        <select class="form-select" id="category" required>
                            <option value="coin">سکه</option>
                            <option value="clock">ساعت</option>
                            <option value="painting">تابلو نقاشی</option>
                            <option value="book">کتاب</option>
                            <option value="statue">مجسمه</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-antique w-100" id="submit-btn">ثبت محصول</button>
                </form>
            </div>
        </div>

        <!-- ====== بخش گالری عکس‌ها (فقط در حالت ویرایش) ====== -->
        <div class="card shadow-sm mx-auto mt-4 d-none" id="images-section" style="max-width: 600px;">
            <div class="card-body p-4">
                <h4 class="mb-3">عکس‌های محصول</h4>

                <div id="images-alert-container"></div>

                <div class="row g-3 mb-3" id="images-gallery">
                    <!-- عکس‌ها اینجا نمایش داده می‌شوند -->
                </div>

                <div class="mb-2">
                    <label for="image-input" class="form-label">افزودن عکس جدید</label>
                    <input type="file" class="form-control" id="image-input" accept="image/*">
                </div>
                <button type="button" class="btn btn-outline-secondary" id="upload-image-btn">آپلود عکس</button>
            </div>
        </div>
    </div>

    <!-- ====== فوتر ====== -->
    <footer class="footer-antique">
        <p class="mb-0">© ۱۴۰۵ آنتیک مارکت - تمامی حقوق محفوظ است</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/add-product.js"></script>
</body>
</html>
